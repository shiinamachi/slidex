name: Release new version

on:
  workflow_dispatch:
    inputs:
      build_channel:
        description: Build channel to publish
        required: true
        default: canary
        type: choice
        options:
          - canary
          - production

run-name: Release new version (${{ inputs.build_channel }}) by @${{ github.actor }}

permissions:
  contents: read

concurrency:
  group: release-new-version-${{ inputs.build_channel }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release-metadata:
    name: Resolve Release Metadata
    runs-on: ubuntu-24.04
    outputs:
      build_channel: ${{ steps.metadata.outputs.build_channel }}
      source_ref: ${{ steps.metadata.outputs.source_ref }}
      commit_sha: ${{ steps.metadata.outputs.commit_sha }}
      short_sha: ${{ steps.metadata.outputs.short_sha }}
      release_version: ${{ steps.metadata.outputs.release_version }}
      tag_name: ${{ steps.metadata.outputs.tag_name }}
      prerelease: ${{ steps.metadata.outputs.prerelease }}
    steps:
      - name: Check out selected source branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ref: ${{ inputs.build_channel == 'canary' && 'develop' || 'main' }}
      - name: Resolve release metadata
        id: metadata
        env:
          BUILD_CHANNEL: ${{ inputs.build_channel }}
        run: |
          set -euo pipefail
          base_version="$(tr -d '[:space:]' < VERSION)"
          commit_sha="$(git rev-parse HEAD)"
          short_sha="$(git rev-parse --short=7 HEAD)"
          case "$BUILD_CHANNEL" in
            canary)
              source_ref="develop"
              release_version="${base_version}-${short_sha}"
              prerelease="true"
              ;;
            production)
              source_ref="main"
              release_version="${base_version}"
              prerelease="false"
              ;;
            *)
              printf 'unsupported build channel: %s\n' "$BUILD_CHANNEL" >&2
              exit 2
              ;;
          esac
          tag_name="v${release_version}"
          {
            printf 'build_channel=%s\n' "$BUILD_CHANNEL"
            printf 'source_ref=%s\n' "$source_ref"
            printf 'commit_sha=%s\n' "$commit_sha"
            printf 'short_sha=%s\n' "$short_sha"
            printf 'release_version=%s\n' "$release_version"
            printf 'tag_name=%s\n' "$tag_name"
            printf 'prerelease=%s\n' "$prerelease"
          } >> "$GITHUB_OUTPUT"
          printf 'Resolved %s build from %s at %s as %s\n' "$BUILD_CHANNEL" "$source_ref" "$short_sha" "$release_version"

  test:
    name: Test (${{ matrix.os }}, ${{ needs.release-metadata.outputs.build_channel }})
    runs-on: ${{ matrix.os }}
    needs:
      - release-metadata
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-15
          - windows-2025
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ref: ${{ needs.release-metadata.outputs.commit_sha }}
      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Show Go version
        run: go version
      - name: Check render dependencies
        run: go run ./cmd/slidex doctor --render --json
      - name: Run render smoke test
        env:
          SLIDEX_REQUIRE_RENDER_SMOKE: "1"
        run: go run ./.github/scripts/go-test-annotate.go -- -count=1 -v -run '^TestDeterministicRenderQAPackageE2E$' ./cmd/slidex
      - name: Run tests
        run: go run ./.github/scripts/go-test-annotate.go -- -count=1 -v -skip '^TestDeterministicRenderQAPackageE2E$' ./...
      - name: Validate sample deck spec
        run: go run ./cmd/slidex validate-spec --spec examples/sample_deck_spec.json
      - name: Run repository doctor
        run: go run ./cmd/slidex doctor --render --json
      - name: Run deck CLI smoke
        run: |
          go run ./cmd/slidex version
          go run ./cmd/slidex init ci-init-smoke --from-template decks/_template
          go run ./cmd/slidex inspect --deck decks/ci-init-smoke --write
          go run ./cmd/slidex migrate --deck decks/ci-init-smoke --from html-pdf --dry-run
          go run ./cmd/slidex clean --deck decks/ci-init-smoke --logs --older-than 0h
      - name: Run delivery CLI smoke
        run: |
          go run ./cmd/slidex init ci-render-smoke --from-template fixtures/minimal_deck
          go run ./cmd/slidex strategy --deck decks/ci-render-smoke
          go run ./cmd/slidex spec --deck decks/ci-render-smoke
          go run ./cmd/slidex build --deck decks/ci-render-smoke
          go run ./cmd/slidex migrate --deck decks/ci-render-smoke --from html-pdf --write --dry-run=false
          go run ./cmd/slidex render --deck decks/ci-render-smoke
          go run ./cmd/slidex visual-review record --deck decks/ci-render-smoke --status pass --inspector ci
          go run ./cmd/slidex qa --deck decks/ci-render-smoke --visual-review manual
          go run ./cmd/slidex finalize --deck decks/ci-render-smoke
          go run ./cmd/slidex review --deck decks/ci-render-smoke --stage all
          go run ./cmd/slidex package --deck decks/ci-render-smoke
      - name: Run workbench save smoke
        run: go run ./cmd/slidex workbench save-smoke --workspace "${{ runner.temp }}/slidex workbench smoke" --deck-id ci-workbench-smoke --screenshot

  cross-compile:
    name: Cross Compile (${{ matrix.goos }}/${{ matrix.goarch }}, ${{ needs.release-metadata.outputs.build_channel }})
    runs-on: ubuntu-24.04
    needs:
      - release-metadata
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
          - goos: windows
            goarch: arm64
            ext: ".exe"
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ref: ${{ needs.release-metadata.outputs.commit_sha }}
      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Build CLI binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -o "${{ runner.temp }}/slidex-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" ./cmd/slidex
      - name: Build release package smoke
        env:
          SLIDEX_BUILD_CHANNEL: local-development
          SLIDEX_RELEASE_TAG: ci-${{ matrix.goos }}-${{ matrix.goarch }}
          SLIDEX_RELEASE_VERSION: ci-${{ matrix.goos }}-${{ matrix.goarch }}
          SLIDEX_DIST_DIR: ${{ runner.temp }}/slidex-dist-${{ matrix.goos }}-${{ matrix.goarch }}
          SLIDEX_TARGETS: ${{ matrix.goos }}/${{ matrix.goarch }}
        run: ./scripts/package-release.sh
      - name: Build test binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go test -c ./cmd/slidex -o "${{ runner.temp }}/slidex-${{ matrix.goos }}-${{ matrix.goarch }}.test${{ matrix.ext }}"

  release:
    name: Release Binaries (${{ needs.release-metadata.outputs.build_channel }})
    runs-on: ubuntu-24.04
    needs:
      - release-metadata
      - test
      - cross-compile
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ref: ${{ needs.release-metadata.outputs.commit_sha }}
      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Ensure release tag
        env:
          COMMIT_SHA: ${{ needs.release-metadata.outputs.commit_sha }}
          TAG_NAME: ${{ needs.release-metadata.outputs.tag_name }}
        run: |
          set -euo pipefail
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git fetch --tags --force
          if git rev-parse -q --verify "refs/tags/${TAG_NAME}" >/dev/null; then
            tagged_commit="$(git rev-list -n 1 "${TAG_NAME}")"
            if [[ "$tagged_commit" != "$COMMIT_SHA" ]]; then
              printf 'tag %s already points to %s, not %s\n' "$TAG_NAME" "$tagged_commit" "$COMMIT_SHA" >&2
              exit 2
            fi
          else
            git tag -a "$TAG_NAME" "$COMMIT_SHA" -m "Release $TAG_NAME"
            git push origin "refs/tags/${TAG_NAME}"
          fi
      - name: Build release packages
        env:
          SLIDEX_BUILD_CHANNEL: ${{ needs.release-metadata.outputs.build_channel }}
          SLIDEX_RELEASE_TAG: ${{ needs.release-metadata.outputs.tag_name }}
          SLIDEX_COMMIT_SHA: ${{ needs.release-metadata.outputs.commit_sha }}
          SLIDEX_RELEASE_VERSION: ${{ needs.release-metadata.outputs.release_version }}
          SLIDEX_DIST_DIR: dist
        run: ./scripts/package-release.sh
      - name: Smoke release package before publish
        env:
          BUILD_CHANNEL: ${{ needs.release-metadata.outputs.build_channel }}
          COMMIT_SHA: ${{ needs.release-metadata.outputs.commit_sha }}
          RELEASE_VERSION: ${{ needs.release-metadata.outputs.release_version }}
          TAG_NAME: ${{ needs.release-metadata.outputs.tag_name }}
        run: |
          set -euo pipefail
          checksum="dist/slidex_${RELEASE_VERSION}_checksums.txt"
          archive="dist/slidex_${RELEASE_VERSION}_linux_amd64.tar.gz"
          test -f "$checksum"
          test -f "$archive"
          (cd dist && sha256sum -c "slidex_${RELEASE_VERSION}_checksums.txt")

          smoke_root="${RUNNER_TEMP}/slidex-release-smoke"
          rm -rf "$smoke_root"
          mkdir -p "$smoke_root"
          tar -xzf "$archive" -C "$smoke_root"
          package_root="$smoke_root/slidex_${RELEASE_VERSION}_linux_amd64"
          metadata="$package_root/.slidex/install.json"
          python3 - dist "$BUILD_CHANNEL" "$TAG_NAME" "$RELEASE_VERSION" "$COMMIT_SHA" <<'PY'
          import json
          import sys
          import tarfile
          import zipfile
          from datetime import datetime
          from pathlib import Path

          dist, channel, tag, version, commit = sys.argv[1:]
          dist = Path(dist)
          prefix = f"slidex_{version}_"
          archives = sorted(path for path in dist.iterdir() if path.name.startswith(prefix) and path.name != f"slidex_{version}_checksums.txt")
          if not archives:
              raise SystemExit(f"{dist}: no release archives found for {version}")

          def parse_target(asset):
              if asset.endswith(".tar.gz"):
                  target = asset[:-7]
              elif asset.endswith(".zip"):
                  target = asset[:-4]
              else:
                  raise SystemExit(f"{asset}: unsupported release archive extension")
              if not target.startswith(prefix):
                  raise SystemExit(f"{asset}: unexpected release archive name")
              os_arch = target[len(prefix):]
              if "_" not in os_arch:
                  raise SystemExit(f"{asset}: missing os/arch segment")
              return target, *os_arch.rsplit("_", 1)

          def read_metadata(path, root):
              metadata_name = f"{root}/.slidex/install.json"
              if path.name.endswith(".tar.gz"):
                  with tarfile.open(path, "r:gz") as archive:
                      try:
                          member = archive.extractfile(metadata_name)
                      except KeyError:
                          raise SystemExit(f"{path}: missing {metadata_name}")
                      if member is None:
                          raise SystemExit(f"{path}: {metadata_name} is not a regular file")
                      return json.load(member)
              with zipfile.ZipFile(path) as archive:
                  try:
                      with archive.open(metadata_name) as member:
                          return json.load(member)
                  except KeyError:
                      raise SystemExit(f"{path}: missing {metadata_name}")

          for archive in archives:
              root, goos, goarch = parse_target(archive.name)
              data = read_metadata(archive, root)
              expected = {
                  "schemaVersion": "slidex.install.v1",
                  "toolName": "slidex",
                  "channel": channel,
                  "tag": tag,
                  "version": version,
                  "commit": commit,
                  "releaseAssetName": archive.name,
                  "installMode": "release-package",
                  "os": goos,
                  "arch": goarch,
              }
              for key, want in expected.items():
                  got = data.get(key)
                  if got != want:
                      raise SystemExit(f"{archive}: {key} = {got!r}, want {want!r}")
              build_time = data.get("buildTime")
              if not build_time:
                  raise SystemExit(f"{archive}: buildTime is missing")
              datetime.fromisoformat(build_time.replace("Z", "+00:00"))
          PY

          "$package_root/slidex" --help >/dev/null
          SLIDEX_INSTALL_ROOT="$package_root" \
            SLIDEX_INSTALL_METADATA="$metadata" \
            "$package_root/slidex" update status --json > "$smoke_root/update-status.json"
          python3 - "$smoke_root/update-status.json" "$BUILD_CHANNEL" "$RELEASE_VERSION" <<'PY'
          import json
          import sys

          path, channel, version = sys.argv[1:]
          with open(path, encoding="utf-8") as f:
              data = json.load(f)
          expected = {
              "channel": channel,
              "currentVersion": version,
              "installMode": "release-package",
              "updatesEnabled": True,
          }
          for key, want in expected.items():
              got = data.get(key)
              if got != want:
                  raise SystemExit(f"{path}: {key} = {got!r}, want {want!r}")
          PY
      - name: Generate artifact attestations
        uses: actions/attest@281a49d4cbb0a72c9575a50d18f6deb515a11deb # v4
        with:
          subject-path: dist/*
      - name: Verify artifact attestations
        env:
          COMMIT_SHA: ${{ needs.release-metadata.outputs.commit_sha }}
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          SOURCE_REF: ${{ needs.release-metadata.outputs.source_ref }}
        run: |
          set -euo pipefail
          signer_workflow="${GH_REPO}/.github/workflows/release.yml"
          source_ref="refs/heads/${SOURCE_REF}"
          verify_attestation() {
            local asset="$1"
            local attempt
            for attempt in 1 2 3 4 5; do
              if gh attestation verify "$asset" \
                --repo "$GH_REPO" \
                --signer-workflow "$signer_workflow" \
                --source-ref "$source_ref" \
                --source-digest "$COMMIT_SHA"; then
                return 0
              fi
              if [[ "$attempt" == "5" ]]; then
                return 1
              fi
              sleep $((attempt * 5))
            done
          }
          for asset in dist/*; do
            verify_attestation "$asset"
          done
      - name: Publish GitHub Release
        env:
          BUILD_CHANNEL: ${{ needs.release-metadata.outputs.build_channel }}
          COMMIT_SHA: ${{ needs.release-metadata.outputs.commit_sha }}
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          PRERELEASE: ${{ needs.release-metadata.outputs.prerelease }}
          RELEASE_VERSION: ${{ needs.release-metadata.outputs.release_version }}
          SOURCE_REF: ${{ needs.release-metadata.outputs.source_ref }}
          TAG_NAME: ${{ needs.release-metadata.outputs.tag_name }}
        run: |
          set -euo pipefail
          notes_file="${RUNNER_TEMP}/slidex-release-notes.md"
          cat > "$notes_file" <<NOTES
          Release packages are built by GitHub Actions for Linux, macOS, and Windows on amd64 and arm64.
          Each archive includes the slidex CLI binary plus the runtime templates, schemas, Codex plugin package, repo marketplace, and install guide required for local use.
          Build channel: ${BUILD_CHANNEL}
          Source branch: ${SOURCE_REF}
          Source commit: ${COMMIT_SHA}
          Version: ${RELEASE_VERSION}
          Release package assets are SHA-256 checksummed and have GitHub artifact attestations generated by this workflow.
          NOTES
          release_flags=()
          if [[ "$PRERELEASE" == "true" ]]; then
            release_flags+=(--prerelease)
          fi
          if gh release view "$TAG_NAME" --repo "$GH_REPO" >/dev/null 2>&1; then
            printf 'release %s already exists; refusing to overwrite immutable release assets\n' "$TAG_NAME" >&2
            exit 2
          fi
          gh release create "$TAG_NAME" dist/* --repo "$GH_REPO" --verify-tag --title "slidex ${RELEASE_VERSION}" --notes-file "$notes_file" "${release_flags[@]}"
          expected_assets="$(mktemp)"
          actual_assets="$(mktemp)"
          find dist -maxdepth 1 -type f -printf '%f\n' | sort > "$expected_assets"
          gh release view "$TAG_NAME" --repo "$GH_REPO" --json assets --jq '.assets[].name' | sort > "$actual_assets"
          diff -u "$expected_assets" "$actual_assets"
