name: Cross Platform

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-15
          - windows-2025
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Show Go version
        run: go version
      - name: Check render dependencies
        run: go run ./cmd/slidex doctor --render --json
      - name: Run render smoke test
        env:
          SLIDEX_REQUIRE_RENDER_SMOKE: "1"
        run: go run ./.github/scripts/go-test-annotate.go -- -count=1 -v -run '^TestDeterministicRenderQAPackageE2E$' ./cmd/slidex
      - name: Run tests
        run: go run ./.github/scripts/go-test-annotate.go -- -count=1 -v -skip '^TestDeterministicRenderQAPackageE2E$' ./...
      - name: Validate sample deck spec
        run: go run ./cmd/slidex validate-spec --spec examples/sample_deck_spec.json
      - name: Run repository doctor
        run: go run ./cmd/slidex doctor --render --json
      - name: Run deck CLI smoke
        run: |
          go run ./cmd/slidex version
          go run ./cmd/slidex init ci-init-smoke --from-template decks/_template
          go run ./cmd/slidex inspect --deck decks/ci-init-smoke --write
          go run ./cmd/slidex migrate --deck decks/ci-init-smoke --from html-pdf --dry-run
          go run ./cmd/slidex clean --deck decks/ci-init-smoke --logs --older-than 0h
      - name: Run delivery CLI smoke
        run: |
          go run ./cmd/slidex init ci-render-smoke --from-template fixtures/minimal_deck
          go run ./cmd/slidex strategy --deck decks/ci-render-smoke
          go run ./cmd/slidex spec --deck decks/ci-render-smoke
          go run ./cmd/slidex build --deck decks/ci-render-smoke
          go run ./cmd/slidex migrate --deck decks/ci-render-smoke --from html-pdf --write --dry-run=false
          go run ./cmd/slidex render --deck decks/ci-render-smoke
          go run ./cmd/slidex visual-review record --deck decks/ci-render-smoke --status pass --inspector ci
          go run ./cmd/slidex qa --deck decks/ci-render-smoke --visual-review manual
          go run ./cmd/slidex finalize --deck decks/ci-render-smoke
          go run ./cmd/slidex review --deck decks/ci-render-smoke --stage all
          go run ./cmd/slidex package --deck decks/ci-render-smoke
      - name: Run workbench save smoke
        run: go run ./cmd/slidex workbench save-smoke --workspace "${{ runner.temp }}/slidex workbench smoke" --deck-id ci-workbench-smoke --screenshot

  cross-compile:
    name: Cross Compile (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
          - goos: windows
            goarch: arm64
            ext: ".exe"
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Build CLI binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -o "${{ runner.temp }}/slidex-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" ./cmd/slidex
      - name: Build release package smoke
        env:
          SLIDEX_RELEASE_VERSION: ci-${{ matrix.goos }}-${{ matrix.goarch }}
          SLIDEX_DIST_DIR: ${{ runner.temp }}/slidex-dist-${{ matrix.goos }}-${{ matrix.goarch }}
          SLIDEX_TARGETS: ${{ matrix.goos }}/${{ matrix.goarch }}
        run: ./scripts/package-release.sh
      - name: Build test binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go test -c ./cmd/slidex -o "${{ runner.temp }}/slidex-${{ matrix.goos }}-${{ matrix.goarch }}.test${{ matrix.ext }}"

  release:
    name: Release Binaries
    runs-on: ubuntu-24.04
    needs:
      - test
      - cross-compile
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Build release packages
        env:
          SLIDEX_RELEASE_VERSION: ${{ github.ref_name }}
          SLIDEX_DIST_DIR: dist
        run: ./scripts/package-release.sh
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          notes_file="${RUNNER_TEMP}/slidex-release-notes.md"
          cat > "$notes_file" <<'NOTES'
          Release packages are built by GitHub Actions for Linux, macOS, and Windows on amd64 and arm64.
          Each archive includes the slidex CLI binary plus the runtime templates, schemas, Codex plugin package, repo marketplace, and install guide required for local use.
          Code signing is deferred and is not part of this release pipeline.
          NOTES
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/* --verify-tag --title "slidex ${GITHUB_REF_NAME}" --notes-file "$notes_file"
          fi
