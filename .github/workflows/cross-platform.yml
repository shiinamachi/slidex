name: Cross Platform

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-15
          - windows-2025
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Show Go version
        run: go version
      - name: Run tests
        env:
          SLIDEX_REQUIRE_RENDER_SMOKE: "1"
        run: go test ./...
      - name: Validate sample deck spec
        run: go run ./cmd/slidex validate-spec --spec examples/sample_deck_spec.json
      - name: Run repository doctor
        run: go run ./cmd/slidex doctor --render --json
      - name: Run deck CLI smoke
        run: |
          go run ./cmd/slidex version
          go run ./cmd/slidex init ci-init-smoke --from-template decks/_template
          go run ./cmd/slidex inspect --deck decks/ci-init-smoke --write
          go run ./cmd/slidex migrate --deck decks/ci-init-smoke --from html-pdf --dry-run
          go run ./cmd/slidex clean --deck decks/ci-init-smoke --logs --older-than 0h
      - name: Run workbench save smoke
        run: go run ./cmd/slidex workbench save-smoke --workspace "${{ runner.temp }}/slidex-workbench-smoke" --deck-id ci-workbench-smoke

  cross-compile:
    name: Cross Compile (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
          - goos: windows
            goarch: arm64
            ext: ".exe"
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Build test binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go test -c ./cmd/slidex -o "${{ runner.temp }}/slidex-${{ matrix.goos }}-${{ matrix.goarch }}.test${{ matrix.ext }}"
